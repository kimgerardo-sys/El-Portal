<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AgoraPolis - Búnker de Activación</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass-nav { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col pb-24 antialiased">

    <!-- CABECERA -->
    <header class="fixed top-0 left-0 right-0 z-40 glass-nav border-b border-slate-800/80 px-4 py-3.5">
        <div class="max-w-xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-500 to-purple-600 flex items-center justify-center border border-indigo-500/30 shadow-lg shadow-indigo-500/20">
                    <i data-lucide="zap" class="w-5 h-5 text-white"></i>
                </div>
                <div>
                    <h1 class="text-base font-bold tracking-tight text-white">Búnker Digital</h1>
                    <p id="current-tab-title" class="text-[10px] text-indigo-400 font-bold tracking-wider uppercase">Periodismo</p>
                </div>
            </div>
            <button id="sync-btn" onclick="fetchData()" class="w-10 h-10 rounded-xl bg-slate-800 border border-slate-700 flex items-center justify-center transition-all active:scale-95">
                <i data-lucide="refresh-cw" class="w-4 h-4 text-slate-300"></i>
            </button>
        </div>
    </header>

    <!-- NOTIFICACIÓN TOAST FLOTANTE -->
    <div id="toast" class="hidden fixed top-20 left-1/2 transform -translate-x-1/2 z-50 bg-emerald-600 text-white text-xs font-bold px-4 py-2.5 rounded-xl shadow-lg border border-emerald-400/30 flex items-center gap-2 transition-all">
        <i data-lucide="check-circle" class="w-4 h-4"></i> <span id="toast-text">Copiado al portapapeles</span>
    </div>

    <!-- CONTENEDOR CENTRAL -->
    <main class="flex-1 max-w-xl w-full mx-auto px-4 pt-24 space-y-4">
        
        <!-- BUSCADOR -->
        <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none">
                <i data-lucide="search" class="w-4 h-4 text-slate-500"></i>
            </span>
            <input type="text" id="search-bar" oninput="renderFeed()" placeholder="Buscar en este segmento..." 
                class="w-full h-11 pl-10 pr-4 bg-slate-800/40 border border-slate-800 rounded-xl text-sm placeholder-slate-500 text-white focus:outline-none focus:border-indigo-500 transition-all">
        </div>

        <!-- RECIPIENTE DE TARJETAS -->
        <div id="feed-container" class="space-y-4">
            <div class="animate-pulse space-y-4">
                <div class="h-44 bg-slate-800/50 rounded-xl border border-slate-800"></div>
            </div>
        </div>
    </main>

    <!-- NAVEGACIÓN INFERIOR FIJA -->
    <nav class="fixed bottom-0 left-0 right-0 glass-nav border-t border-slate-800/80 z-40">
        <div class="max-w-xl mx-auto flex justify-around items-center h-18">
            <button onclick="switchTab('Periodismo')" class="section-nav flex flex-col items-center justify-center w-20 h-14 text-indigo-400" data-section="Periodismo">
                <i data-lucide="newspaper" class="w-5 h-5 mb-1"></i>
                <span class="text-[10px] font-bold tracking-wide">Periodismo</span>
            </button>
            <button onclick="switchTab('Analisis')" class="section-nav flex flex-col items-center justify-center w-20 h-14 text-slate-400" data-section="Analisis">
                <i data-lucide="trending-up" class="w-5 h-5 mb-1"></i>
                <span class="text-[10px] font-bold tracking-wide">Tendencias</span>
            </button>
            <button onclick="switchTab('Consultoria')" class="section-nav flex flex-col items-center justify-center w-20 h-14 text-slate-400" data-section="Consultoria">
                <i data-lucide="award" class="w-5 h-5 mb-1"></i>
                <span class="text-[10px] font-bold tracking-wide">Estrategia</span>
            </button>
        </div>
    </nav>

    <!-- VENTANA FLOTANTE: LECTOR DE PÁGINAS WEB INTERNO -->
    <div id="reader-modal" class="hidden fixed inset-0 z-50 bg-slate-950/80 backdrop-blur-md flex flex-col justify-end sm:justify-center p-0 sm:p-4">
        <div class="bg-slate-900 w-full max-w-2xl mx-auto h-[85vh] sm:h-[80vh] rounded-t-2xl sm:rounded-2xl border border-slate-800 flex flex-col overflow-hidden shadow-2xl">
            <div class="px-4 py-3 bg-slate-850 border-b border-slate-800 flex items-center justify-between">
                <span id="modal-source-badge" class="text-xs font-bold text-indigo-400 uppercase tracking-wider">Portal Web</span>
                <button onclick="closeReaderModal()" class="w-8 h-8 rounded-lg bg-slate-800 flex items-center justify-center text-slate-400 hover:text-white">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
            <div class="flex-1 w-full h-full bg-white">
                <iframe id="news-frame" src="" class="w-full h-full border-0 bg-white"></iframe>
            </div>
        </div>
    </div>

    <script>
        const SPREADSHEET_ID = "1u1Hey3bmvuU_MrO4NEQItXHquXFwRQjsxO7vsucEbh8"; 
        let currentSection = "Periodismo"; 
        let feedData = [];

        const tabNamesVisual = {
            "Periodismo": "Periodismo (Webs y Blogs)",
            "Analisis": "Tendencias (Redes Sociales)",
            "Consultoria": "Estrategia (Avisos y Flyers)"
        };

        document.addEventListener("DOMContentLoaded", () => {
            lucide.createIcons();
            fetchData();
        });

        async function fetchData() {
            const syncBtn = document.getElementById('sync-btn');
            if (syncBtn) syncBtn.classList.add('animate-spin');

            const cache = localStorage.getItem(`polis_action_cache_${currentSection}`);
            if (cache) {
                feedData = JSON.parse(cache);
                renderFeed();
            }

            try {
                const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(currentSection)}&_ts=${Date.now()}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error();
                
                const csvText = await response.text();
                const parsedData = parseCSVToJSON(csvText);

                if (parsedData.length > 0) {
                    feedData = parsedData.sort((a, b) => parseInt(b.id || 0) - parseInt(a.id || 0));
                    localStorage.setItem(`polis_action_cache_${currentSection}`, JSON.stringify(feedData));
                    renderFeed();
                }
            } catch (err) {
                console.error("Error al conectar", err);
            } finally {
                if (syncBtn) syncBtn.classList.remove('animate-spin');
            }
        }

        function parseCSVToJSON(csvText) {
            const lines = []; let row = [""]; let inQuotes = false;
            for (let i = 0; i < csvText.length; i++) {
                let c = csvText[i]; let next = csvText[i+1];
                if (c === '"') { if (inQuotes && next === '"') { row[row.length - 1] += '"'; i++; } else { inQuotes = !inQuotes; } }
                else if (c === ',' && !inQuotes) { row.push(''); }
                else if ((c === '\r' || c === '\n') && !inQuotes) { if (c === '\r' && next === '\n') { i++; } lines.push(row); row = ['']; }
                else { row[row.length - 1] += c; }
            }
            if (row.length > 1 || row[0] !== '') lines.push(row);
            if (lines.length <= 1) return [];

            const headers = lines[0].map(h => h.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, ""));
            const jsonArray = [];

            for (let i = 1; i < lines.length; i++) {
                const line = lines[i]; if (line.length < headers.length) continue;
                const record = {}; let hasContent = false;
                headers.forEach((header, index) => {
                    const value = line[index] ? line[index].trim() : "";
                    record[header] = value;
                    if (header === "titulo" && value !== "") hasContent = true;
                });
                if (hasContent) jsonArray.push(record);
            }
            return jsonArray;
        }

        function renderFeed() {
            const container = document.getElementById("feed-container");
            container.innerHTML = "";
            const searchVal = document.getElementById("search-bar").value.toLowerCase();

            const filtered = feedData.filter(item => {
                const itemTitle = (item.titulo || "").toString().toLowerCase();
                const itemResumen = (item.resumen || "").toString().toLowerCase();
                const itemFuente = (item.fuente || "").toString().toLowerCase();
                return itemTitle.includes(searchVal) || itemResumen.includes(searchVal) || itemFuente.includes(searchVal);
            });

            if (filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-12 text-slate-600 text-xs">No hay registros en este segmento.</div>`;
                return;
            }

            filtered.forEach(item => {
                const card = document.createElement("div");
                card.className = "bg-slate-800/40 border border-slate-800/80 rounded-xl p-4 flex flex-col space-y-3";

                const title = item.titulo || "Sin título";
                const resumen = item.resumen || "";
                const fuente = item.fuente || "Mesa de Control";
                const pfm = item.tematica || "Web";
                const link = item.link || "";
                const img = item.imagen || "";

                let icon = "globe"; let badgeColor = "bg-slate-800 text-slate-300 border-slate-700";
                if (pfm === "Facebook") { icon = "facebook"; badgeColor = "bg-blue-500/10 text-blue-400 border-blue-500/20"; }
                else if (pfm === "Instagram") { icon = "instagram"; badgeColor = "bg-pink-500/10 text-pink-400 border-pink-500/20"; }
                else if (pfm === "X") { icon = "twitter"; badgeColor = "bg-sky-500/10 text-sky-400 border-sky-500/20"; }
                else if (pfm === "Aviso") { icon = "alert-circle"; badgeColor = "bg-amber-500/10 text-amber-400 border-amber-500/20"; }

                let imageHTML = img ? `<div class="w-full max-h-64 rounded-lg overflow-hidden border border-slate-700/50 bg-slate-900"><img src="${escapeHTML(img)}" class="w-full h-full object-cover"></div>` : "";
                
                let actionsHTML = "";

                // RENDERIZADO POR SEGMENTOS SOLICITADOS
                if (currentSection === "Periodismo") {
                    actionsHTML = `
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="openReaderModal('${escapeHTML(link)}', '${escapeHTML(fuente)}')" class="h-10 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-semibold flex items-center justify-center gap-1.5 transition-all">
                                <i data-lucide="book-open" class="w-3.5 h-3.5"></i> Leer aquí dentro
                            </button>
                            <button onclick="copyTextToClipboard('${escapeHTML(link)}', '¡Enlace de nota copiado!')" class="h-10 rounded-lg bg-slate-800 hover:bg-slate-700 text-slate-200 text-xs font-semibold flex items-center justify-center gap-1.5 border border-slate-700/60 transition-all">
                                <i data-lucide="copy" class="w-3.5 h-3.5"></i> Copiar Link
                            </button>
                        </div>
                    `;
                } 
                else if (currentSection === "Analisis") {
                    // Segmento de Tendencias (Redes de Líderes)
                    actionsHTML = `
                        <div class="space-y-2">
                            <p class="text-[11px] text-indigo-400 font-medium">👉 Instrucción: Entra al post para dar Like, Comentar y Compartir de inmediato.</p>
                            <a href="${escapeHTML(link)}" target="_blank" rel="noopener noreferrer" class="w-full h-11 rounded-lg bg-slate-800 hover:bg-indigo-600 text-white text-xs font-bold flex items-center justify-center gap-2 border border-slate-700/60 transition-all active:scale-95">
                                <i data-lucide="external-link" class="w-4 h-4"></i> Interactuar en ${pfm}
                            </a>
                        </div>
                    `;
                } 
                else if (currentSection === "Consultoria") {
                    // Segmento de Estrategia (Avisos y Flyers)
                    let copyFlyerBtn = img ? `
                        <button onclick="copyTextToClipboard('${escapeHTML(img)}', '¡Link del Flyer copiado para compartir!')" class="w-full h-10 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-bold flex items-center justify-center gap-1.5 transition-all">
                            <i data-lucide="image" class="w-3.5 h-3.5"></i> Copiar Enlace del Flyer
                        </button>
                    ` : "";
                    
                    let copyInstructionBtn = `
                        <button onclick="copyTextToClipboard('${escapeHTML(resumen)}', '¡Instrucción de texto copiada!')" class="w-full h-10 rounded-lg bg-slate-800 hover:bg-slate-700 text-slate-200 text-xs font-semibold flex items-center justify-center gap-1.5 border border-slate-700/60 transition-all">
                            <i data-lucide="copy" class="w-3.5 h-3.5"></i> Copiar Texto de Tarea
                        </button>
                    `;

                    actionsHTML = `
                        <div class="flex flex-col space-y-2">
                            ${copyFlyerBtn}
                            ${copyInstructionBtn}
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="flex items-center justify-between">
                        <span class="text-xs font-bold text-indigo-400 tracking-wide">${escapeHTML(fuente)}</span>
                        <span class="flex items-center gap-1 text-[10px] font-bold border px-2 py-0.5 rounded-md ${badgeColor}"><i data-lucide="${icon}" class="w-3 h-3"></i> ${pfm}</span>
                    </div>
                    ${imageHTML}
                    <h2 class="text-sm font-bold text-white leading-snug">${escapeHTML(title)}</h2>
                    <p class="text-xs text-slate-300 leading-relaxed whitespace-pre-wrap">${escapeHTML(resumen)}</p>
                    ${actionsHTML}
                `;
                container.appendChild(card);
            });
            lucide.createIcons();
        }

        // FUNCIÓN DEL PORTAPAPELES UNIVERSAL (Soporta móviles viejos y nuevos)
        function copyTextToClipboard(text, successMessage) {
            if (!navigator.clipboard) {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed"; 
                document.body.appendChild(textArea);
                textArea.focus(); textArea.select();
                try { document.execCommand('copy'); showToast(successMessage); } catch (err) { console.error(err); }
                document.body.removeChild(textArea);
                return;
            }
            navigator.clipboard.writeText(text).then(() => {
                showToast(successMessage);
            }).catch(err => console.error(err));
        }

        function showToast(msg) {
            const toast = document.getElementById("toast");
            document.getElementById("toast-text").innerText = msg;
            toast.classList.remove("hidden");
            setTimeout(() => { toast.classList.add("hidden"); }, 2500);
        }

        function openReaderModal(url, fuente) {
            if(!url || url === "") { alert("Esta nota no cuenta con link de origen."); return; }
            document.getElementById("modal-source-badge").innerText = `Portal: ${fuente}`;
            document.getElementById("news-frame").src = url;
            document.getElementById("reader-modal").classList.remove("hidden");
        }
        
        function closeReaderModal() {
            document.getElementById("reader-modal").classList.add("hidden");
            document.getElementById("news-frame").src = "";
        }

        function switchTab(s) {
            currentSection = s;
            document.getElementById("current-tab-title").innerText = tabNamesVisual[s];
            document.querySelectorAll(".section-nav").forEach(n => {
                if(n.getAttribute("data-section") === s) n.classList.replace("text-slate-400", "text-indigo-400");
                else n.classList.replace("text-indigo-400", "text-slate-400");
            });
            fetchData();
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, t => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[t] || t));
        }
    </script>
</body>
</html>
